name: Build Geode Mod

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Mod
        uses: geode-sdk/build-geode-mod@main
        with:
        # правильный тег для геода 2.2081
          sdk: v5.7.1
          # привязка cmake к корню сервера
          path: ${{ github.workspace }}
          # спасите пожалуйста cpp такое говнище
